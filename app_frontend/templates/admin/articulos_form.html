{% extends "layouts/base_dashboard.html" %} {% block sidebar_links %}
<li>
  <a href="/admin/articulos"><i class="fa-solid fa-arrow-left"></i> Volver</a>
</li>
{% endblock %} {% block dashboard_content %}
<div class="history-container">
  <div class="history-header">
    <h1>{{ "Editar Artículo" if articulo else "Nuevo Artículo" }}</h1>
    <p>Complete los datos requeridos para gestionar el inventario.</p>
  </div>

  <form
    action="/admin/articulos/guardar"
    method="POST"
    class="admin-form"
    style="
      max-width: 800px;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    "
  >
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px">
      <div class="data-group">
        <label for="nombre">Nombre del Artículo</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          class="admin-input"
          required
          placeholder="Ej: Osciloscopio Rigol"
        />
      </div>
      <div class="data-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" class="admin-select" required>
          <option value="">Seleccione un tipo</option>
          <option value="electronica">Electrónica</option>
          <option value="libros">Libros</option>
          <option value="herramientas">Herramientas</option>
        </select>
      </div>
    </div>

    <div class="data-group" style="margin-top: 20px">
      <label for="descripcion">Descripción</label>
      <textarea
        id="descripcion"
        name="descripcion"
        class="admin-input"
        rows="4"
        placeholder="Detalles técnicos o estado del equipo..."
      ></textarea>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
      "
    >
      <div class="data-group">
        <label for="stock">Stock Inicial</label>
        <input
          type="number"
          id="stock"
          name="stock"
          class="admin-input"
          value="1"
          min="0"
        />
      </div>
      <div class="data-group">
        <label for="seccion">Sección/Ubicación</label>
        <input
          type="text"
          id="seccion"
          name="seccion"
          class="admin-input"
          placeholder="Ej: Laboratorio 4"
        />
      </div>
    </div>

    <div
      style="
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      "
    >
      <button type="button" class="btn-secondary" onclick="history.back()">
        Cancelar
      </button>
      <button type="submit" class="register-btn-nav">Guardar Artículo</button>
    </div>
  </form>
</div>
{% endblock %}
