openapi: 3.0.3
info:
  title: API de Gestión de Inventario, Préstamos y Penalizaciones
  description: >
    Esta API maneja la autenticación de usuarios, administración de perfiles, 
    control centralizado de stock (materiales, herramientas, placas, libros), 
    flujo de préstamos/reservas mediante validación por QR, gestión de penalizaciones 
    y generación de reportes/estadísticas.
  version: 2.0.0
servers:
  - url: /
    description: Servidor Base Local

paths:
  # ==========================================
  # 1. Autenticación y Accesos (/api/auth)
  # ==========================================
  /api/auth/login:
    post:
      tags:
        - Autenticación
      summary: Inicia sesión utilizando flask-login
      description: Valida credenciales y establece la sesión indicando el rol (alumno/profesor, bibliotecario/admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación exitosa. Devuelve el rol y los datos de perfil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales inválidas.
        '403':
          description: Cuenta inactiva. No se emite token.
        '400':
          description: Datos de entrada incorrectos.

  /api/auth/logout:
    post:
      tags:
        - Autenticación
      summary: Cierra la sesión activa del usuario
      description: Cierra la sesión actual del usuario.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sesión cerrada con éxito.
        '401':
          description: No autorizado.

  /api/auth/me:
    get:
      tags:
        - Autenticación
      summary: Obtener datos del perfil actual
      description: Devuelve los datos de perfil y el rol del usuario actualmente autenticado.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Datos del usuario autenticado obtenidos correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPerfil'
        '401':
          description: No autorizado.

  /api/auth/logup:
    post:
      tags:
        - Autenticación
      summary: Crea una cuenta de usuario (registro público)
      description: Registra un nuevo usuario con rol 'alumno', guarda el hash de contraseña y devuelve un token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogUpRequest'
      responses:
        '201':
          description: Usuario creado y autenticado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogUpResponse'
        '400':
          description: Datos inválidos.
        '409':
          description: Conflicto (entrada duplicada).
        '500':
          description: Error interno.

  # ==========================================
  # 2. Usuarios (/api/users)
  # ==========================================
  /api/usuarios:
    get:
      tags:
        - Usuarios
      summary: Lista los usuarios registrados
      description: Devuelve una lista completa de usuarios. Admin y bibliotecario.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de usuarios obtenida con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDetail'
        '403':
          description: Prohibido. Permisos insuficientes.

    post:
      tags:
        - Usuarios
      summary: Alta (ABM) de un nuevo usuario
      description: Permite registrar un nuevo usuario en el sistema. Admin y bibliotecario.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Usuario creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: Datos inválidos o conflicto.
        '403':
          description: Prohibido. Permisos insuficientes.

  /api/usuario:
    get:
      tags:
        - Usuarios
      summary: Lista usuarios (endpoint de compatibilidad)
      description: Endpoint agregado por compatibilidad. Devuelve usuarios desde la tabla users.
      responses:
        '200':
          description: Lista de usuarios obtenida.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserLegacyDetail'

  /api/usuario/{usuario_id}:
    parameters:
      - name: usuario_id
        in: path
        required: true
        description: Identificador único del usuario.
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Usuarios
      summary: Obtiene un usuario por ID (endpoint de compatibilidad)
      description: Endpoint agregado por compatibilidad. Admin y bibliotecario.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Usuario encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: ID inválido.
        '401':
          description: No autorizado.
        '404':
          description: Usuario no encontrado.

  /api/usuarios/{usuario_id}:
    parameters:
      - name: usuario_id
        in: path
        required: true
        description: Identificador único del usuario.
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Usuarios
      summary: Obtiene los detalles de un usuario específico
      description: Admin y bibliotecario.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Detalles del usuario.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '404':
          description: Usuario no encontrado.

    put:
      tags:
        - Usuarios
      summary: Modifica los datos de un usuario existente
      description: >
        Admin y bibliotecario pueden actualizar datos generales, incluido activo.
        Alumno y profesor solo pueden actualizar su propia contraseña.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/UserUpdate'
                - $ref: '#/components/schemas/UserPasswordUpdate'
      responses:
        '200':
          description: Usuario modificado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          description: Datos de actualización inválidos.
        '404':
          description: Usuario no encontrado.

    delete:
      tags:
        - Usuarios
      summary: Baja o desactivación lógica de un usuario (Opción 1)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Usuario dado de baja con éxito.
        '404':
          description: Usuario no encontrado.

  /api/usuarios/{usuario_id}/reservas:
    get:
      tags:
        - Usuarios
      summary: Obtiene el historial personal de préstamos/pedidos
      description: Admin y bibliotecario pueden consultar cualquier usuario; alumno y profesor solo pueden consultar su propio historial.
      parameters:
        - name: usuario_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Historial obtenido correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoanCompact'
        '404':
          description: Alumno no encontrado.
        '403':
          description: Prohibido. El usuario autenticado no puede consultar reservas ajenas.


  # ==========================================
  # 3. Inventario y Materiales (/api/items)
  # ==========================================
  /api/articulos:
    get:
      tags:
        - Inventario y Materiales
      summary: Lista el material disponible
      description: Acceso público (sin autenticación requerida). Incluye soporte para filtros por tipo, estado y disponibilidad.
      parameters:
        - name: category
          in: query
          required: false
          description: Filtrar por tipo o categoría.
          schema:
            type: string
        - name: condition
          in: query
          required: false
          description: Filtrar por condición física.
          schema:
            type: string
        - name: available
          in: query
          required: false
          description: Filtrar solo elementos disponibles.
          schema:
            type: boolean
      responses:
        '200':
          description: Catálogo obtenido correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemDetail'

    post:
      tags:
        - Inventario y Materiales
      summary: Ingreso/creación de un nuevo ítem al inventario
      description: (Solo Admin).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Ítem agregado con éxito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetail'
        '400':
          description: Datos incorrectos.
        '403':
          description: Prohibido. Permisos insuficientes.

  /api/articulos/{articulo_id}:
    parameters:
      - name: articulo_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Inventario y Materiales
      summary: Consulta el detalle de un ítem por ID
      description: Endpoint GET implementado en la variante de compatibilidad (tabla items).
      responses:
        '200':
          description: Detalle del ítem.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemLegacyDetail'
        '404':
          description: Ítem no encontrado.

    put:
      tags:
        - Inventario y Materiales
      summary: Actualiza la información general de un ítem
      description: (Solo Admin).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
      responses:
        '200':
          description: Ítem actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetail'
        '403':
          description: Prohibido.
        '404':
          description: Ítem no encontrado.

    delete:
      tags:
        - Inventario y Materiales
      summary: Baja definitiva o lógica del ítem del inventario
      description: (Solo Admin).
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Ítem eliminado.
        '403':
          description: Prohibido.
        '404':
          description: Ítem no encontrado.

  /api/articulos/{articulo_id}/condition:
    patch:
      tags:
        - Inventario y Materiales
      summary: Actualiza específicamente el estado o condición física del ítem
      parameters:
        - name: articulo_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - estado
              properties:
                estado:
                  type: string
                  enum: [disponible, dañado, reparacion, "dado de baja"]
      responses:
        '200':
          description: Condición actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemDetail'
        '404':
          description: Ítem no encontrado.

  # ==========================================
  # 4. Préstamos y Solicitudes (/api/loans)
  # ==========================================
  /api/reservas:
    get:
      tags:
        - Préstamos y Reservas
      summary: Lista los préstamos
      description: Admin ve todos, el alumno ve los propios. Permite filtrar por estado, fechas o disponibilidad.
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [Pendiente, Aprobado, Entregado, Devuelto, Rechazado]
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de préstamos obtenida.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoanDetail'

    post:
      tags:
        - Préstamos y Reservas
      summary: Crea una nueva solicitud de reserva
      description: Endpoint de compatibilidad. Admin y bibliotecario pueden crear reservas para cualquier usuario; alumno y profesor solo pueden crear reservas propias.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanCreateLegacyRequest'
      responses:
        '201':
          description: Reserva creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanCreateLegacyResponse'
        '400':
          description: Validaciones fallidas.
        '404':
          description: Usuario o ítem no encontrado.
        '403':
          description: Prohibido. El usuario autenticado no puede crear reservas para otro usuario.

  /api/reservas/{reserva_id}:
    parameters:
      - name: reserva_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Préstamos y Reservas
      summary: Obtiene los detalles completos de un préstamo o solicitud
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Detalles devueltos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanDetail'
        '404':
          description: Préstamo no encontrado.
        '403':
          description: Prohibido. El usuario autenticado no puede consultar reservas ajenas.

  /api/reservas/{reserva_id}/status:
    patch:
      tags:
        - Préstamos y Reservas
      summary: Cambia el estado del préstamo
      description: Admin y bibliotecario pueden cambiar el estado; alumno y profesor solo pueden cancelar reservas propias pendientes.
      parameters:
        - name: reserva_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanStatusUpdate'
      responses:
        '200':
          description: Estado actualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanDetail'
        '403':
          description: Prohibido.
        '404':
          description: Préstamo no encontrado.

  # ==========================================
  # 5. Códigos QR (/api/qr)
  # ==========================================
  /api/qr/reservas/{id_reserva}:
    get:
      tags:
        - Códigos QR
      summary: Genera o devuelve el código QR dinámico
      description: Admin y bibliotecario pueden consultar cualquier QR; alumno y profesor solo pueden consultar QR de reservas propias.
      security:
        - BearerAuth: []
      parameters:
        - name: id_reserva
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Código QR generado/obtenido correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id_reserva:
                    type: integer
                  qrData:
                    type: string
                    description: Contenido o representación base64 del QR.
        '404':
          description: Préstamo no encontrado.
        '403':
          description: Prohibido. El usuario autenticado no puede consultar QR de reservas ajenas.

  # ==========================================
  # 6. Penalizaciones (/api/penalties)
  # ==========================================
  /api/penalizaciones:
    get:
      tags:
        - Penalizaciones
      summary: Lista general de penalizaciones activas e históricas
      description: Admin y bibliotecario pueden listar todas las penalizaciones; alumno y profesor solo pueden consultar las propias con usuario_id.
      security:
        - BearerAuth: []
      parameters:
        - name: usuario_id
          in: query
          required: false
          description: Identificador del usuario para filtrar penalizaciones.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Listado obtenido.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PenaltyDetail'
        '400':
          description: Parámetros de consulta inválidos.
        '403':
          description: Prohibido. El usuario autenticado no puede consultar penalizaciones ajenas.

    post:
      tags:
        - Penalizaciones
      summary: Genera una nueva penalización manual a un alumno
      description: Admin, bibliotecario o profesor pueden crear una penalización manual.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PenaltyCreate'
      responses:
        '201':
          description: Penalización creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenaltyDetail'
        '400':
          description: Error en datos.
        '403':
          description: Prohibido.

  /api/penalizaciones/{penalty_id}:
    parameters:
      - name: penalty_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Penalizaciones
      summary: Obtiene el detalle de una penalización específica
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Detalle obtenido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenaltyDetail'
        '404':
          description: Penalización no encontrada.

    put:
      tags:
        - Penalizaciones
      summary: Modifica o levanta una penalización reemplazando el registro completo
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PenaltyUpdate'
      responses:
        '200':
          description: Penalización reemplazada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenaltyDetail'
        '404':
          description: Penalización no encontrada.

    patch:
      tags:
        - Penalizaciones
      summary: Actualiza parcialmente los datos de una penalización
      description: Ajusta severidad, agrega notas o la marca como resuelta.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PenaltyPatchUpdate'
      responses:
        '200':
          description: Penalización actualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PenaltyDetail'
        '404':
          description: Penalización no encontrada.

  # ==========================================
  # 7. Normativas (/api/normativas)
  # ==========================================
  /api/normativas/:
    get:
      tags:
        - Normativas
      summary: Lista normativas con paginación HATEOAS
      parameters:
        - name: limit
          in: query
          required: false
          description: Cantidad máxima de registros a devolver. Default 10, máximo 100.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Posición inicial del listado. Default 0.
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Normativas obtenidas con metadata y links HATEOAS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NormativasResponse'
        '400':
          description: Parámetros de paginación inválidos.

  # ==========================================
  # 8. Reportes y Estadísticas (/api/reports)
  # ==========================================
  /api/reports:
    get:
      tags:
        - Reportes y Estadísticas
      summary: Endpoint unificado y centralizado para la generación de reportes
      description: '(Admin y bibliotecario). Soporta tipos: pendientes, devueltos, atrasados, todos, carreras, articulos mediante query params.'
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          required: true
          description: Tipo de reporte a generar.
          schema:
            type: string
            enum: [pendientes, devueltos, atrasados, todos, carreras, articulos]
        - name: format
          in: query
          required: false
          description: Formato de salida del reporte.
          schema:
            type: string
            enum: [json, pdf]
            default: json
        - name: limit
          in: query
          required: false
          description: Cantidad máxima de registros a devolver. Default 10, máximo 100.
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: Posición inicial del listado. Default 0.
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Reporte generado exitosamente con metadata y links HATEOAS.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportsResponse'
        '400':
          description: Parámetros inválidos.
        '403':
          description: Prohibido.
  # ==========================================
  # 8. Salud del Sistema (/ping)
  # ==========================================
  /ping:
    get:
      tags:
        - Salud del Sistema
      summary: Verifica que el backend esté activo y respondiendo
      responses:
        '200':
          description: El servicio está operativo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mensaje:
                    type: string
                  base_de_datos:
                    type: string
                  resultado_test:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PaginationMetadata:
      type: object
      properties:
        limit:
          type: integer
          example: 10
        offset:
          type: integer
          example: 0
        total:
          type: integer
          example: 35
        count:
          type: integer
          example: 10

    HateoasLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
          example: /api/articulos?limit=10&offset=0
        prev:
          type: string
          nullable: true
          example: null
        next:
          type: string
          nullable: true
          example: /api/articulos?limit=10&offset=10
        last:
          type: string
          nullable: true
          example: /api/articulos?limit=10&offset=30

    LoginRequest:
      type: object
      required:
        - email
        - contrasenia
      properties:
        email:
          type: string
          format: email
        contrasenia:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        rol:
          type: string
          enum: [alumno, profesor, bibliotecario, admin]
        usuario:
          $ref: '#/components/schemas/UserPerfil'

    LogUpRequest:
      type: object
      required:
        - nombre
        - email
        - carrera
        - contrasenia
      properties:
        nombre:
          type: string
        email:
          type: string
          format: email
        carrera:
          type: string
        contrasenia:
          type: string
          format: password

    LogUpResponse:
      type: object
      properties:
        token:
          type: string
        rol:
          type: string
          enum: [alumno, profesor, bibliotecario, admin]
        usuario:
          $ref: '#/components/schemas/UserPerfil'

    UserPerfil:
      type: object
      properties:
        id:
          type: integer
          format: int64
